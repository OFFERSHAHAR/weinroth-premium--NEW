# Render Blueprint — static Vite site. Connect this repo on render.com once;
# afterwards every git push to main auto-deploys.
services:
  - type: web
    name: weinroth-premium
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    # Multipage SSG: every route is a real prerendered file (nested index.html),
    # so no SPA catch-all rewrite. Unknown paths fall through to the 404 page.
    routes:
      - type: rewrite
        source: /404
        destination: /404.html
